name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reorganize files into expected folder structure
        run: |
          mkdir -p www/js www/css native-src scripts
          shopt -s nullglob

          [ -f index.html ] && mv index.html www/ || true
          [ -f settings.html ] && mv settings.html www/ || true
          [ -f style.css ] && mv style.css www/css/ || true
          [ -f app.js ] && mv app.js www/js/ || true
          [ -f settings.js ] && mv settings.js www/js/ || true

          for f in *.kt; do mv "$f" native-src/; done
          [ -f AndroidManifest.additions.xml ] && mv AndroidManifest.additions.xml native-src/ || true
          [ -f patch-android.js ] && mv patch-android.js scripts/ || true

          echo "Resulting structure:"
          find www native-src scripts -type f

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch Android project with native plugin
        run: node scripts/patch-android.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen-recorder-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
